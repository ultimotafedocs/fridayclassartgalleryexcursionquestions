
<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
#app{font-family:var(--font-sans);display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem;gap:1.25rem;width:100%}
.header{width:100%;max-width:560px;display:flex;align-items:baseline;justify-content:space-between}
.header h2{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.counter-pill{font-size:12px;font-weight:500;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:99px;padding:3px 10px}
.subtitle{font-size:13px;color:var(--color-text-secondary);width:100%;max-width:560px;margin-top:-0.5rem}
.wheel-stage{display:flex;flex-direction:column;align-items:center;width:100%;max-width:560px}
.pointer-wrap{display:flex;justify-content:center;margin-bottom:-2px;z-index:2}
.canvas-wrap{width:100%;position:relative}
.canvas-wrap canvas{width:100%;height:auto;display:block;border-radius:50%}
.outer-ring{position:absolute;inset:0;border-radius:50%;border:3px solid var(--color-border-secondary);pointer-events:none}
.btn-row{display:flex;gap:12px;margin-top:1rem;align-items:center}
#spinBtn{padding:13px 52px;font-size:16px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer}
#spinBtn:hover{background:var(--color-background-secondary)}
#spinBtn:disabled{opacity:.3;cursor:not-allowed}
#spinBtn:active{transform:scale(.98)}
.reset-btn{display:flex;align-items:center;gap:6px;padding:13px 18px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.reset-btn:hover{background:var(--color-background-secondary)}
.result-card{width:100%;max-width:560px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem 1.75rem;display:none}
.result-card.show{display:block}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem}
.rc-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.col-big{font-size:26px;font-weight:500;color:var(--color-text-primary);line-height:1.2}
.color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:6px}
.divider{width:100%;height:0.5px;background:var(--color-border-tertiary);margin-bottom:1rem}
.prompt-label{font-size:11px;font-weight:500;color:#185FA5;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.prompt-text{font-size:15px;color:var(--color-text-primary);line-height:1.65;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.875rem 1.125rem;margin-bottom:.875rem}
.eg-row{font-size:13px;color:var(--color-text-secondary);line-height:1.55}
.eg-row em{color:var(--color-text-primary);font-style:italic}
.done-card{width:100%;max-width:560px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2.5rem 2rem;text-align:center;display:none}
.done-card strong{display:block;font-size:22px;font-weight:500;color:var(--color-text-primary);margin-bottom:.5rem}
.done-card p{font-size:14px;color:var(--color-text-secondary)}
</style>

<div id="app">
<h2 class="sr-only">Spin the wheel — prepositional collocations</h2>
<div class="header">
  <h2>Spin the wheel</h2>
  <span class="counter-pill" id="counter">47 left</span>
</div>
<p class="subtitle">Spin to get a collocation, then make a sentence about our upcoming gallery visit or Friday class!</p>
<div class="wheel-stage">
  <div class="pointer-wrap">
    <svg width="30" height="34" viewBox="0 0 30 34" fill="none">
      <polygon points="15,34 1,3 29,3" fill="#D85A30"/>
      <polygon points="15,34 1,3 29,3" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="canvas-wrap">
    <canvas id="wheel"></canvas>
    <div class="outer-ring"></div>
  </div>
</div>
<div class="btn-row">
  <button id="spinBtn" onclick="spin()">Spin</button>
  <button class="reset-btn" onclick="resetAll()">
    <i class="ti ti-refresh" aria-hidden="true" style="font-size:16px"></i> Reset
  </button>
</div>
<div class="result-card" id="resultCard">
  <div class="rc-top">
    <div>
      <div class="rc-label">Your collocation</div>
      <div class="col-big" id="resultCol"></div>
    </div>
    <div class="color-dot" id="colorDot"></div>
  </div>
  <div class="divider"></div>
  <div class="prompt-label">Make a sentence!</div>
  <div class="prompt-text" id="resultPrompt"></div>
  <div class="eg-row">Example: <em id="resultEg"></em></div>
</div>
<div class="done-card" id="doneCard">
  <i class="ti ti-circle-check" aria-hidden="true" style="font-size:32px;color:var(--color-text-secondary);display:block;margin-bottom:1rem"></i>
  <strong>All done!</strong>
  <p>Every collocation used — excellent work! Press Reset to play again.</p>
</div>
</div>

<script>
const ALL=[
  {col:"afraid of / scared of",prompt:"Are you scared of anything at the Art Gallery — big artworks, crowds, or something else? Tell us!",eg:"I think I will be a little scared of the huge sculptures."},
  {col:"afraid to",prompt:"Is there something you are afraid to do or say in our Friday class? Share with us!",eg:"At first I was afraid to speak in front of the class."},
  {col:"agree on",prompt:"What do you and a classmate agree on about the gallery visit — what are you both looking forward to?",eg:"We agreed on the fact that we both want to see the Indigenous art section."},
  {col:"agree with",prompt:"Do you agree with how we do our Friday conversation class? Why?",eg:"I agree with using real topics — it helps me practise naturally."},
  {col:"angry about",prompt:"Is there anything you might feel angry about on the gallery trip — for example, queues or rules? Tell us!",eg:"I might feel angry about not being allowed to take photos inside."},
  {col:"angry with",prompt:"Were you ever angry with yourself in class — for example, for forgetting a word?",eg:"I was angry with myself for forgetting the word I wanted to use."},
  {col:"apologise for",prompt:"Can you think of a situation at the gallery where you might need to apologise for something?",eg:"I might have to apologise for accidentally bumping into someone."},
  {col:"apologise to",prompt:"Did you need to apologise to anyone in class this term? Tell us the story.",eg:"I apologised to my classmate for interrupting her."},
  {col:"apply for",prompt:"If the Art Gallery offered a free art class, would you apply for it? Why or why not?",eg:"I would definitely apply for a free photography class there."},
  {col:"apply to",prompt:"Do you feel ready to apply to an English-speaking job or course now? Tell us.",eg:"I think I am ready to apply to an English-speaking workplace now."},
  {col:"arrive at",prompt:"How are you planning to arrive at the Art Gallery? What time do you want to get there?",eg:"I am planning to arrive at the gallery by train at about 10am."},
  {col:"arrive in",prompt:"When did you first arrive in Sydney? How did you feel?",eg:"When I arrived in Sydney, I was amazed by how big it was."},
  {col:"belong to",prompt:"Does our Friday class belong to the best part of your week? Why or why not?",eg:"Friday class belongs to the best part of my week because I can speak freely."},
  {col:"borrow from",prompt:"Do you think you will borrow any ideas or inspiration from the artworks at the gallery?",eg:"I hope to borrow some colour ideas from the abstract paintings."},
  {col:"cause of",prompt:"What do you think is the main cause of your English improvement? Is Friday class part of it?",eg:"I think speaking regularly is the main cause of my progress."},
  {col:"complain about",prompt:"Is there anything you might complain about on the gallery trip? What would bother you?",eg:"I might complain about the lack of seats if we walk around for a long time."},
  {col:"complain to",prompt:"If something goes wrong at the gallery, who will you complain to? Do you feel ready to do it in English?",eg:"I will complain to the information desk if something is not clear."},
  {col:"cope with",prompt:"How do you cope with speaking English in a public place? What helps you feel confident?",eg:"I cope with nerves by preparing some sentences before I go out."},
  {col:"depend on",prompt:"Will your enjoyment of the gallery depend on understanding the artworks, or just how they look?",eg:"For me, it will depend on the mood I am in when I see them."},
  {col:"difference between",prompt:"What do you think the difference between the Art Gallery of NSW and a museum will be?",eg:"I think the difference between the two is that a gallery focuses more on visual art."},
  {col:"different from",prompt:"Do you think the Art Gallery of NSW will be different from galleries or museums in your home country?",eg:"I think it will be different from the ones at home because it will feel more open."},
  {col:"different to",prompt:"Is our Friday conversation class different to other English classes you have had? How?",eg:"This class is different to others because we talk about real things."},
  {col:"excited about",prompt:"What are you most excited about for the gallery trip? Tell us!",eg:"I am really excited about seeing Australian Indigenous art for the first time."},
  {col:"fond of",prompt:"Are you fond of any style of art? What do you hope to find at the gallery?",eg:"I am quite fond of landscapes, so I hope there are some big ones there."},
  {col:"good at",prompt:"What are you getting good at in our Friday class? Give us an example!",eg:"I think I am getting good at asking follow-up questions."},
  {col:"good for",prompt:"Why do you think visiting a gallery like this will be good for your English learning?",eg:"Reading the artwork labels will be really good for building new vocabulary."},
  {col:"good with",prompt:"Are you getting good with talking to new people in English? How has class helped?",eg:"I feel I am getting better with strangers since joining this class."},
  {col:"interested in",prompt:"Which type of art are you most interested in seeing at the gallery — Indigenous, modern, or classical?",eg:"I am really interested in seeing the First Nations collection."},
  {col:"keen on",prompt:"Are you keen on visiting more galleries around Sydney after this trip? Which one is on your list?",eg:"I am keen on checking out the White Rabbit Gallery after this."},
  {col:"lend to",prompt:"After the trip, what story or memory would you lend to a friend who cannot come?",eg:"I will lend my photos to her so she can feel like she was there."},
  {col:"listen to",prompt:"Will you listen to the audio guide at the gallery? Do you usually listen to English content outside class?",eg:"I am planning to listen to the audio guide — I think it will help a lot."},
  {col:"look at",prompt:"Which type of artwork are you most hoping to look at at the gallery? Describe what you imagine.",eg:"I really want to look at the big abstract paintings and see how they make me feel."},
  {col:"married to",prompt:"Are you married to the idea of going to the gallery, or do you feel nervous? Be honest!",eg:"I am married to the idea — I have been looking forward to it all term."},
  {col:"problem with",prompt:"Do you think there will be any problem with getting to the gallery or finding your way around?",eg:"The only problem with the trip might be finding the right entrance."},
  {col:"proud of",prompt:"What are you most proud of from our Friday class this term?",eg:"I am proud of myself for using new words naturally in a conversation."},
  {col:"reason for",prompt:"What is the main reason for your excitement — or nerves — about the gallery visit?",eg:"The main reason for my excitement is that I have never been to an art gallery before."},
  {col:"rely on",prompt:"Will you rely on a translation app at the gallery, or will you try to read everything in English first?",eg:"I will try in English first and only rely on my phone if I am really stuck."},
  {col:"responsible for",prompt:"In a group project about the gallery, what would you want to be responsible for?",eg:"I would want to be responsible for writing the descriptions of the artworks."},
  {col:"same as",prompt:"Is Friday class the same as you expected when you first joined? What surprised you?",eg:"The class is not the same as I imagined — it is much more relaxed."},
  {col:"sick of",prompt:"Is there anything you are sick of in learning English — a rule, a topic, a type of exercise?",eg:"I am a bit sick of grammar worksheets — I prefer talking!"},
  {col:"spend on",prompt:"How much time do you spend on English outside class each week? What do you spend it on?",eg:"I spend about an hour a day on watching English videos on YouTube."},
  {col:"talk about",prompt:"What is the most interesting thing we talked about in Friday class this term?",eg:"We talked about culture shock and it was the best lesson for me."},
  {col:"talk to / talk with",prompt:"Do you think you will talk to any gallery staff or strangers on the trip? How do you feel about that?",eg:"I hope I will talk to a gallery guide — I want to practise my English."},
  {col:"think about",prompt:"What type of artwork do you think you will still be thinking about after the gallery visit?",eg:"I think I will keep thinking about any portraits that look very realistic."},
  {col:"think of",prompt:"What do you think of our Friday conversation class overall? Give your honest opinion!",eg:"I think of it as the best part of my week — it never feels like studying."},
  {col:"used to",prompt:"Are you used to visiting galleries and museums? Will this be a new experience for you?",eg:"I am not really used to spending a long time in galleries, but I am looking forward to it."},
  {col:"worried about",prompt:"Are you worried about anything before the gallery trip — language, getting lost, or something else?",eg:"I am a little worried about not understanding the labels, but I will try my best."}
];

const PALETTE=[
  "#534AB7","#7F77DD","#AFA9EC",
  "#0F6E56","#1D9E75","#5DCAA5",
  "#993C1D","#D85A30","#F0997B",
  "#185FA5","#378ADD","#85B7EB",
  "#854F0B","#BA7517","#EF9F27",
  "#72243E","#993556","#D4537E",
  "#27500A","#3B6D11","#639922"
];

let remaining=[];
let spinning=false;
let currentAngle=0;
let audioCtx=null;
const canvas=document.getElementById('wheel');
const ctx=canvas.getContext('2d');
let DPR=window.devicePixelRatio||1;

function setupCanvas(){
  const wrap=canvas.parentElement;
  const size=wrap.clientWidth;
  canvas.width=Math.round(size*DPR);
  canvas.height=Math.round(size*DPR);
  canvas.style.width=size+'px';
  canvas.style.height=size+'px';
}

function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTick(freq,vol){
  try{
    const a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type='triangle';o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.045);
    o.start(a.currentTime);o.stop(a.currentTime+0.05);
  }catch(e){}
}
function playWin(){
  try{
    const a=getAudio();
    [523,659,784,1047].forEach((f,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.type='sine';o.frequency.value=f;
      const t=a.currentTime+i*.13;
      g.gain.setValueAtTime(.18,t);
      g.gain.exponentialRampToValueAtTime(.001,t+.28);
      o.start(t);o.stop(t+.3);
    });
  }catch(e){}
}

function drawWheel(angle){
  const size=canvas.width/DPR;
  ctx.save();
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,size,size);
  const cx=size/2,cy=size/2,r=size/2-4;
  const n=remaining.length;
  if(n===0){
    ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
    ctx.fillStyle='#E1F5EE';ctx.fill();
    ctx.restore();return;
  }
  const arc=(2*Math.PI)/n;
  for(let i=0;i<n;i++){
    const s=angle+i*arc,e=s+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=PALETTE[i%PALETTE.length];ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=1.5;ctx.stroke();
  }
  for(let i=0;i<n;i++){
    const mid=angle+i*arc+arc/2;
    const tr=r*0.70;
    ctx.save();
    ctx.translate(cx,cy);ctx.rotate(mid);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.95)';
    const fs=n>30?Math.max(9,r/24):n>15?Math.max(10,r/20):Math.max(11,r/17);
    ctx.font=`500 ${fs}px sans-serif`;
    ctx.fillText(remaining[i].col,tr,0);
    ctx.restore();
  }
  const hub=size*0.055;
  ctx.beginPath();ctx.arc(cx,cy,hub,0,2*Math.PI);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,hub*0.3,0,2*Math.PI);
  ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fill();
  ctx.restore();
}

function updateCounter(){
  document.getElementById('counter').textContent=remaining.length+' left';
}

function resetAll(){
  remaining=ALL.slice();
  currentAngle=0;
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('doneCard').style.display='none';
  document.getElementById('spinBtn').disabled=false;
  updateCounter();
  setupCanvas();
  drawWheel(currentAngle);
}

function spin(){
  if(spinning||remaining.length===0)return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('resultCard').classList.remove('show');
  const extra=(5+Math.floor(Math.random()*5))*2*Math.PI;
  const stop=Math.random()*2*Math.PI;
  const total=extra+stop;
  const dur=4200+Math.random()*1300;
  const t0=performance.now();
  const a0=currentAngle;
  const n=remaining.length;
  const arc=(2*Math.PI)/n;
  let lastSec=-1;
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(now){
    const prog=Math.min((now-t0)/dur,1);
    currentAngle=a0+total*ease(prog);
    drawWheel(currentAngle);
    const norm=((-currentAngle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
    const sec=Math.floor(norm/arc)%n;
    if(sec!==lastSec){
      const spd=1-ease(prog);
      playTick(280+spd*600,Math.min(.2,.04+spd*.28));
      lastSec=sec;
    }
    if(prog<1)requestAnimationFrame(frame);
    else{spinning=false;playWin();showResult();}
  }
  requestAnimationFrame(frame);
}

function showResult(){
  const n=remaining.length;
  const arc=(2*Math.PI)/n;
  const norm=((-currentAngle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/arc)%n;
  const item=remaining[idx];
  const col=PALETTE[idx%PALETTE.length];
  document.getElementById('resultCol').textContent=item.col;
  document.getElementById('resultPrompt').textContent=item.prompt;
  document.getElementById('resultEg').textContent=item.eg;
  document.getElementById('colorDot').style.background=col;
  document.getElementById('resultCard').classList.add('show');
  remaining.splice(idx,1);
  updateCounter();
  if(remaining.length===0){
    setTimeout(()=>{
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('doneCard').style.display='block';
    },4500);
  } else {
    setTimeout(()=>{
      document.getElementById('spinBtn').disabled=false;
      drawWheel(currentAngle);
    },350);
  }
}

window.addEventListener('resize',()=>{
  DPR=window.devicePixelRatio||1;
  setupCanvas();
  drawWheel(currentAngle);
});

resetAll();
</script>
